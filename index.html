<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>unnamed.png</title>
  <link rel="icon" href="unnamed.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #stage {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
    }

    #frame {
      position: relative;
      flex-shrink: 0;
      line-height: 0;
    }

    #frame img#painting {
      width: 100%;
      height: 100%;
      display: block;
    }

    #frame img#sig {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 10%;
    }
  </style>
</head>
<body>
  <div id="stage">
    <div id="frame">
      <img id="painting" src="unnamed.png" alt="Early digital painting I created for Apple Computer to be published with my sample code for creating Macintosh applications in C on Apple's developer CD around 1992/93.">
      <img id="sig" src="email.png" alt="">
    </div>
  </div>
  <audio id="music" src="orbit-d0d-main-version-29627-02-39.mp3" loop></audio>
  <script>
    const music = document.getElementById('music')
    music.volume = 0.5

    const start = () => {
      music.play().catch(() => {})
      document.removeEventListener('click', start)
      document.removeEventListener('keydown', start)
    }

    document.addEventListener('click', start)
    document.addEventListener('keydown', start)
    music.play().catch(() => {})

    document.getElementById('stage').addEventListener('dblclick', () => {
      if (document.fullscreenElement) {
        document.exitFullscreen()
      } else {
        document.documentElement.requestFullscreen()
      }
    })

    const painting = document.getElementById('painting')
    const frame = document.getElementById('frame')
    const stage = document.getElementById('stage')
    const PADDING = 8

    const fit = () => {
      const availW = stage.clientWidth - PADDING * 2
      const availH = stage.clientHeight - PADDING * 2
      const ratio = painting.naturalWidth / painting.naturalHeight
      const w = availW / availH > ratio ? availH * ratio : availW
      const h = w / ratio
      frame.style.width = `${w}px`
      frame.style.height = `${h}px`
    }

    painting.complete ? fit() : painting.addEventListener('load', fit)
    window.addEventListener('resize', fit)
  </script>
</body>
</html>
